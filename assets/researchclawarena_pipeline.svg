<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ResearchClawArena benchmark pipeline</title>
  <desc id="desc">A process-level evaluation pipeline for AI Scientist agents on real research tasks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfcfd"/>
      <stop offset="1" stop-color="#f6f9fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#1f2937" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#223449" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-family: Georgia, 'Times New Roman', serif; font-size: 76px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 31px; font-weight: 500; fill: #38506f; }
      .box { fill: #ffffff; stroke: #b8c5d2; stroke-width: 2; filter: url(#shadow); }
      .eval { fill: #f3faf8; stroke: #6da69d; stroke-width: 2.2; filter: url(#shadow); }
      .badge { fill: #38506f; }
      .badge2 { fill: #5f9892; }
      .num { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 20px; font-weight: 800; fill: #ffffff; }
      .label { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
      .small { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #1f2937; }
      .caption { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; font-size: 20px; font-style: italic; fill: #38506f; }
      .arrow { stroke: #223449; stroke-width: 3.2; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .line { stroke: #8aa0b5; stroke-width: 2; fill: none; stroke-linecap: round; }
      .dash { stroke: #38506f; stroke-width: 2; fill: none; stroke-dasharray: 5 7; stroke-linecap: round; }
      .icon { stroke: #142236; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .tealFill { fill: #8fc7be; stroke: #142236; stroke-width: 3; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1385" cy="160" r="180" fill="#e9f3f3" opacity="0.55"/>
  <circle cx="165" cy="710" r="210" fill="#eef4fb" opacity="0.65"/>

